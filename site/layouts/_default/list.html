{{ define "main" }}
<section class="list-page">
  <div class="container">
    <h1>{{ if .IsHome }}Essays{{ else }}{{ .Title }}{{ end }}</h1>
    {{ $pages := .RegularPages }}
    {{ if .IsHome }}{{ $pages = where site.RegularPages "Section" "posts" }}{{ end }}
    {{ range $pages }}
      {{ partial "post-card.html" . }}
    {{ else }}
      <p>No essays yet.</p>
    {{ end }}
  </div>
</section>
{{ end }}
