<header class="site-header">
  <div class="container site-header-inner">
    <div style="display:flex; align-items:center;">
      <a href="{{ "" | relURL }}" class="site-brand">{{ site.Title }}</a>
      <nav class="site-nav">
        <a href="{{ "" | relURL }}" class="{{ if .IsHome }}active{{ end }}">Home</a>
        <a href="{{ "/posts/" | relURL }}" class="{{ if or (eq .Section "posts") (strings.HasPrefix .RelPermalink "/posts") }}active{{ end }}">Essays</a>
      </nav>
    </div>

    <div class="site-header-right">
      <button id="theme-toggle" class="icon-btn" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>
